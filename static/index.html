<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业级库存盘点与差异自动化管理系统</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">📦</div>
                <div class="logo-text">
                    <h1>库存盘点系统</h1>
                    <p>Inventory Management</p>
                </div>
            </div>
            <nav class="nav">
                <a href="#" class="nav-item active" data-view="dashboard">
                    <span class="nav-icon">📊</span>
                    <span>仪表板</span>
                </a>
                <a href="#" class="nav-item" data-view="orders">
                    <span class="nav-icon">📋</span>
                    <span>盘点工单</span>
                    <span class="badge" id="orderBadge">0</span>
                </a>
                <a href="#" class="nav-item" data-view="check">
                    <span class="nav-icon">📝</span>
                    <span>手动盘点</span>
                </a>
                <a href="#" class="nav-item" data-view="reports">
                    <span class="nav-icon">📈</span>
                    <span>报告中心</span>
                </a>
                <a href="#" class="nav-item" data-view="monthly">
                    <span class="nav-icon">📅</span>
                    <span>月度分析</span>
                </a>
                <a href="#" class="nav-item" data-view="logs">
                    <span class="nav-icon">📜</span>
                    <span>操作日志</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-primary btn-block" id="btnRunDaily">▶ 执行每日盘点</button>
            </div>
        </aside>

        <main class="main">
            <header class="topbar">
                <div class="breadcrumb" id="breadcrumb">首页 / 仪表板</div>
                <div class="topbar-actions">
                    <span class="user-info">👤 管理员</span>
                </div>
            </header>

            <section class="content" id="content">
            </section>
        </main>
    </div>

    <div class="modal" id="modal">
        <div class="modal-mask"></div>
        <div class="modal-content" id="modalContent">
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/app.js"></script>
</body>
</html>
